<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard por Zona</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.botones button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }
</style>
</head>

<body>

<h2>Dashboard por Zona</h2>

<div class="botones" id="botonesMes"></div>
<div id="tablaResumen"></div>

<script>

const URL_CSV = "https://docs.google.com/spreadsheets/d/1OsRXS125K9GfH24Qa6nriI4-MUeQB_OWWhJBdi1arw0/export?format=csv&gid=0";

// 📊 PLIEGO
const pliego = {
  "Zona 1": 2590,
  "Zona 2": 15246,
  "Zona 3": 16238,
  "Zona 4": 9980,
  "Zona 5": 8309
};

let datosGlobal = [];
let certificadoSeleccionado = null;

// 🔧 normalizar texto
function limpiarTexto(txt) {
  if (!txt) return "";
  return txt.toString().trim().toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// 🔧 zona
function normalizarZona(z) {
  if (!z) return null;
  let num = z.toString().replace(/\D/g, "");
  if (["1","2","3","4","5"].includes(num)) return "Zona " + num;
  return null;
}

// 🔢 parse número (formato argentino)
function parseNumero(valor) {
  if (!valor) return 0;

  let limpio = valor.toString()
    .replace(/\./g, "")
    .replace(",", ".");

  return parseFloat(limpio) || 0;
}

// 📅 parse fecha
function parseFecha(fechaStr) {
  if (!fechaStr) return null;

  let partes = fechaStr.split(" ")[0].split("/");
  if (partes.length !== 3) return null;

  return new Date(partes[2], partes[1]-1, partes[0]);
}

// 📥 cargar CSV
Papa.parse(URL_CSV, {
  download: true,
  header: true,
  complete: function(results) {
    datosGlobal = results.data;
    crearBotones();
  }
});

// 🔘 BOTONES (sin julio/agosto)
function crearBotones() {
  const cont = document.getElementById("botonesMes");

  let certificados = [...new Set(
    datosGlobal
      .map(d => d["Certificado MES"])
      .filter(Boolean)
      .filter(m => {
        let txt = limpiarTexto(m);
        return !txt.includes("JULIO") && !txt.includes("AGOSTO");
      })
  )];

  certificados.forEach(c => {
    let btn = document.createElement("button");
    btn.innerText = c;

    btn.onclick = () => {
      certificadoSeleccionado = c;
      calcular();
    };

    cont.appendChild(btn);
  });
}

// 🧠 CALCULAR
function calcular() {

  let filtrados = datosGlobal.filter(d => 
    limpiarTexto(d["Certificado MES"]) === limpiarTexto(certificadoSeleccionado)
  );

  let resultado = {};

  Object.keys(pliego).forEach(zona => {
    resultado[zona] = {
      longitud: 0,
      rechazados: 0,
      revision: 0,
      ultimaFecha: null
    };
  });

  filtrados.forEach(d => {

    let zona = normalizarZona(d["Zona"]);
    let estado = limpiarTexto(d["Aprobación"]);
    let longitud = parseNumero(d["Longitud"]);
    let fecha = parseFecha(d["Marca temporal"]);

    if (!zona) return;

    // ✅ APROBADO o 50%
    if (estado === "APROBADO" || estado.includes("50")) {
      let factor = estado.includes("50") ? 0.5 : 1;

      resultado[zona].longitud += longitud * factor;

      if (fecha && (!resultado[zona].ultimaFecha || fecha > resultado[zona].ultimaFecha)) {
        resultado[zona].ultimaFecha = fecha;
      }
    }

    // ❌ RECHAZADO
    if (estado.includes("RECHAZ")) {
      resultado[zona].rechazados += longitud;
    }

    // 🟡 EN REVISION
    if (estado.includes("REVISION")) {
      resultado[zona].revision += longitud;
    }

  });

  renderTabla(resultado);
}

// 📊 TABLA
function renderTabla(data) {

  let html = `<table>
    <tr>
      <th>Zona</th>
      <th>Longitud Aprobada</th>
      <th>% Pliego</th>
      <th>Última Aprobación</th>
      <th>Longitud Rechazada</th>
      <th>Longitud en Revisión</th>
    </tr>`;

  Object.keys(data).forEach(z => {
    let d = data[z];
    let porcentaje = ((d.longitud / pliego[z]) * 100 || 0).toFixed(1);

    html += `<tr>
      <td>${z}</td>
      <td>${d.longitud.toFixed(0)}</td>
      <td>${porcentaje}%</td>
      <td>${d.ultimaFecha ? d.ultimaFecha.toLocaleDateString() : "-"}</td>
      <td>${d.rechazados.toFixed(0)}</td>
      <td>${d.revision.toFixed(0)}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("tablaResumen").innerHTML = html;
}

</script>

</body>
</html>

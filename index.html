<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard por Zona</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

h2 { margin-bottom: 10px; }

.botones button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #f5f5f5;
}

.botones button:hover {
  background: #ddd;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }
</style>
</head>

<body>

<h2>Dashboard por Zona</h2>

<div class="botones" id="botonesMes"></div>

<div id="tablaResumen"></div>

<script>

// 🔗 GOOGLE SHEETS
const URL_CSV = "https://docs.google.com/spreadsheets/d/1OsRXS125K9GfH24Qa6nriI4-MUeQB_OWWhJBdi1arw0/export?format=csv&gid=0";

// 📊 PLIEGO
const pliego = {
  "Zona 1": 2590,
  "Zona 2": 15246,
  "Zona 3": 16238,
  "Zona 4": 9980,
  "Zona 5": 8309
};

let datosGlobal = [];
let certificadoSeleccionado = null;

// 🔧 Normalizar texto (clave para evitar errores)
function limpiarTexto(txt) {
  if (!txt) return "";
  return txt
    .toString()
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// 📅 Parse fecha (dd/mm/yyyy)
function parseFecha(fechaStr) {
  if (!fechaStr) return null;

  let partes = fechaStr.split(" ")[0].split("/");
  if (partes.length !== 3) return null;

  return new Date(partes[2], partes[1] - 1, partes[0]);
}

// 📥 Cargar datos
Papa.parse(URL_CSV, {
  download: true,
  header: true,
  complete: function(results) {
    datosGlobal = results.data;
    crearBotones();
  }
});

// 🔘 BOTONES (Certificado)
function crearBotones() {
  const cont = document.getElementById("botonesMes");

  let certificados = [...new Set(
    datosGlobal.map(d => d["Certificado"]).filter(c => c && c !== "")
  )];

  certificados.forEach(c => {
    let btn = document.createElement("button");
    btn.innerText = c;

    btn.onclick = () => {
      certificadoSeleccionado = c;
      calcular();
    };

    cont.appendChild(btn);
  });
}

// 🧠 CALCULAR
function calcular() {

  let filtrados = datosGlobal.filter(d => d["Certificado"] === certificadoSeleccionado);

  let resultado = {};

  Object.keys(pliego).forEach(zona => {
    resultado[zona] = {
      longitud: 0,
      rechazados: 0,
      revision: 0,
      ultimaFecha: null
    };
  });

  filtrados.forEach(d => {

    let zona = d["Zona"];
    let estado = limpiarTexto(d["Aprobación"]);
    let longitud = parseFloat(d["Longitud"]) || 0;
    let fecha = parseFecha(d["Marca temporal"]);

    if (!zona || !resultado[zona]) return;

    if (estado === "APROBADO") {
      resultado[zona].longitud += longitud;

      if (!resultado[zona].ultimaFecha || fecha > resultado[zona].ultimaFecha) {
        resultado[zona].ultimaFecha = fecha;
      }
    }

    if (estado === "RECHAZADO") {
      resultado[zona].rechazados++;
    }

    if (estado === "EN REVISION") {
      resultado[zona].revision++;
    }
  });

  renderTabla(resultado);
}

// 📊 TABLA
function renderTabla(data) {

  let html = `
  <table>
    <tr>
      <th>Zona</th>
      <th>Longitud Aprobada</th>
      <th>% Pliego</th>
      <th>Última Aprobación</th>
      <th>Rechazados</th>
      <th>En Revisión</th>
    </tr>
  `;

  Object.keys(data).forEach(zona => {
    let d = data[zona];

    let porcentaje = pliego[zona]
      ? ((d.longitud / pliego[zona]) * 100).toFixed(1)
      : 0;

    html += `
      <tr>
        <td>${zona}</td>
        <td>${d.longitud.toFixed(0)}</td>
        <td>${porcentaje}%</td>
        <td>${d.ultimaFecha ? d.ultimaFecha.toLocaleDateString() : "-"}</td>
        <td>${d.rechazados}</td>
        <td>${d.revision}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("tablaResumen").innerHTML = html;
}

</script>

</body>
</html>

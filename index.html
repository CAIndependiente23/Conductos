<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Limpieza de Conductos</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.botones button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

.faltante {
  background-color: #ffcccc;
}
</style>
</head>

<body>

<h2>Limpieza de Conductos</h2>

<div id="loading">Cargando datos...</div>

<div class="botones" id="botonesMes"></div>

<div id="tablaResumen"></div>

<div style="width: 80%; margin: 40px auto;">
  <canvas id="graficoZonas"></canvas>
</div>

<h3>Detalle de Registros</h3>

<div style="margin-bottom:10px;">
  <label>Zona:</label>
  <select id="filtroZona">
    <option value="TODAS">Todas</option>
    <option>Zona 1</option>
    <option>Zona 2</option>
    <option>Zona 3</option>
    <option>Zona 4</option>
    <option>Zona 5</option>
  </select>

  <label style="margin-left:20px;">Buscar calle:</label>
  <input type="text" id="buscadorCalle" placeholder="Ej: Corrientes">
</div>

<div id="tablaDetalle"></div>
<div id="paginado"></div>

<script>

// LINKS
const URLS_ZONAS = {
  "Zona 1": "https://docs.google.com/spreadsheets/d/1HIJJCVYnwaDdAvgxfI4tBA-5wn_0B1Bog19cUgJYyuo/export?format=csv&gid=2037627206",
  "Zona 2": "https://docs.google.com/spreadsheets/d/1_uR77zitjM6EpbPlmhg92VaNteJuYb28hQkDKbWX2V4/export?format=csv&gid=1607259408",
  "Zona 3": "https://docs.google.com/spreadsheets/d/1Li4R4gjFHbFwryFgteY5KS3y43MGdiqL5zEu4NK_v6w/export?format=csv&gid=996112756",
  "Zona 4": "https://docs.google.com/spreadsheets/d/1AZAvTvfohVXr8qKlZuejzD1FXHO5T2itzG8rZpbkVUc/export?format=csv&gid=184101373",
  "Zona 5": "https://docs.google.com/spreadsheets/d/1gaPIk0bPccxj1Wi853iEzvPN3OhE92L1cHgMYJYgztI/export?format=csv&gid=1465503285"
};

// PLIEGO
const pliego = {
  "Zona 1": 2590,
  "Zona 2": 15246,
  "Zona 3": 16238,
  "Zona 4": 9980,
  "Zona 5": 8309
};

let datosGlobal = [];
let mesSeleccionado = null;
let chart = null;
let paginaActual = 1;
const POR_PAGINA = 100;

// UTILS
function limpiarTexto(txt) {
  return (txt || "").toString().trim().toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function getColumna(row, nombre) {
  let key = Object.keys(row).find(k => limpiarTexto(k) === limpiarTexto(nombre));
  return key ? row[key] : null;
}

function parseNumero(valor) {
  let limpio = (valor || "").toString().replace(/\./g, "").replace(",", ".");
  return parseFloat(limpio) || 0;
}

function parseFecha(f) {
  if (!f) return null;
  let p = f.split(" ")[0].split("/");
  return new Date(p[2], p[1]-1, p[0]);
}

// MES
function parseMes(texto) {
  const meses = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
  const corto = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

  let t = limpiarTexto(texto);
  let i = meses.findIndex(m => t.includes(m));
  let y = (t.match(/\d{4}/) || [])[0];

  if (i < 0 || !y) return null;

  let fecha = new Date(y, i, 1);

  return {
    key: fecha.getTime(),
    label: corto[i] + "-" + y.slice(2)
  };
}

// CARGA
async function cargarDatos() {

  let promesas = Object.entries(URLS_ZONAS).map(([zona, url]) =>
    new Promise(resolve => {
      Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: r => {
          resolve(r.data.map(d => {

            let mes = parseMes(getColumna(d,"Certificado MES"));

            return {
              Zona: zona,
              mesKey: mes?.key,
              mesLabel: mes?.label,
              estado: getColumna(d,"Aprobación"),
              longitud: getColumna(d,"Longitud"),
              fecha: getColumna(d,"Marca temporal"),
              comuna: getColumna(d,"Comuna"),
              calle: getColumna(d,"Calle de traza"),
              inicio: getColumna(d,"Intersección Inicio"),
              fin: getColumna(d,"Intersección Fin"),
              diametro: getColumna(d,"Diámetro"),
              foto1: getColumna(d,"Foto Bajada I (Inicio)"),
              foto2: getColumna(d,"Foto Bajada II (Fin)"),
              foto3: getColumna(d,"Foto BR")
            };
          }));
        }
      });
    })
  );

  datosGlobal = (await Promise.all(promesas)).flat().filter(d => d.mesKey);

  document.getElementById("loading").style.display = "none";

  crearBotones();
}

// BOTONES MES
function crearBotones() {

  let meses = [...new Map(datosGlobal.map(d => [d.mesKey,d])).values()]
    .sort((a,b)=>a.mesKey-b.mesKey)
    .filter(m => m.mesLabel !== "JUL-25" && m.mesLabel !== "AGO-25");

  let cont = document.getElementById("botonesMes");
  cont.innerHTML = "";

  meses.forEach(m => {
    let b = document.createElement("button");
    b.innerText = m.mesLabel;
    b.onclick = () => { mesSeleccionado = m.mesKey; paginaActual=1; calcular(); };
    cont.appendChild(b);
  });
}

// CALCULAR
function calcular() {

  let filtrados = datosGlobal.filter(d => d.mesKey === mesSeleccionado);

  let res = {};
  Object.keys(pliego).forEach(z => res[z]={longitud:0,rechazados:0,revision:0,ultimaFecha:null});

  filtrados.forEach(d=>{
    let z=d.Zona, e=limpiarTexto(d.estado), l=parseNumero(d.longitud), f=parseFecha(d.fecha);
    if(!e) return;

    if(e==="APROBADO"||e.includes("50")){
      let fac=e.includes("50")?0.5:1;
      res[z].longitud+=l*fac;
      if(f && (!res[z].ultimaFecha || f>res[z].ultimaFecha)) res[z].ultimaFecha=f;
    }
    if(e.includes("RECHAZ")) res[z].rechazados+=l;
    if(e.includes("REVISION")) res[z].revision+=l;
  });

  renderTabla(res);
  renderGrafico(res);
  renderDetalle(filtrados);
}

// TABLA
function renderTabla(data){

  let html=`<table><tr>
  <th>Zona</th><th>Aprobado</th><th>%</th><th>Faltantes</th>
  <th>Última</th><th>Rechazado</th><th>Revisión</th></tr>`;

  Object.keys(data).forEach(z=>{
    let d=data[z];
    let p = ((d.longitud/pliego[z])*100 || 0).toFixed(1);
    let falt = pliego[z] - d.longitud;

    html+=`<tr>
    <td>${z}</td>
    <td>${d.longitud.toFixed(0)}</td>
    <td>${p}%</td>
    <td class="${falt>0?'faltante':''}">${falt.toFixed(0)}</td>
    <td>${d.ultimaFecha?d.ultimaFecha.toLocaleDateString():"-"}</td>
    <td>${d.rechazados.toFixed(0)}</td>
    <td>${d.revision.toFixed(0)}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("tablaResumen").innerHTML=html;
}

// GRAFICO (FIX %)
function renderGrafico(data){

  let ctx=document.getElementById("graficoZonas").getContext("2d");

  if(chart) chart.destroy();

  let zonas=Object.keys(data);

  let vals=zonas.map(z =>
    Number(((data[z].longitud / pliego[z]) * 100).toFixed(1))
  );

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:zonas,
      datasets:[
        {
          label:"Avance %",
          data:vals,
          backgroundColor:['#FFD700','#007BFF','#FF69B4','#28A745','#FF8C00']
        },
        {
          label:"Meta 100%",
          type:"line",
          data:zonas.map(()=>100),
          borderDash:[6,6],
          borderColor:"rgba(0,0,0,0.25)",
          pointRadius:0,
          borderWidth:2,
          fill:false
        }
      ]
    },
    options:{
      indexAxis:'y',
      animation:false,
      plugins:{
        legend:{
          labels:{
            filter:(item)=>item.text!=="Meta 100%"
          }
        },
        tooltip:{
          callbacks:{
            label:function(context){
              return context.dataset.label + ": " + Number(context.raw).toFixed(1) + "%";
            }
          }
        }
      },
      scales:{
        x:{suggestedMax:120}
      }
    }
  });
}

// DETALLE
function renderDetalle(filtrados){

  let zona=document.getElementById("filtroZona").value;
  let txt=limpiarTexto(document.getElementById("buscadorCalle").value);

  let datos=filtrados.filter(d=>{
    return (zona==="TODAS"||d.Zona===zona) &&
           (!txt || limpiarTexto(d.calle).includes(txt));
  });

  let totalPag=Math.ceil(datos.length/POR_PAGINA);
  let inicio=(paginaActual-1)*POR_PAGINA;
  let page=datos.slice(inicio,inicio+POR_PAGINA);

  let html=`<table><tr>
  <th>Zona</th><th>Comuna</th><th>Calle</th>
  <th>Inicio</th><th>Fin</th><th>Diámetro</th>
  <th>Longitud</th><th>Aprobación</th><th>Fotos</th></tr>`;

  page.forEach(d=>{
    html+=`<tr>
    <td>${d.Zona}</td>
    <td>${d.comuna||"-"}</td>
    <td>${d.calle||"-"}</td>
    <td>${d.inicio||"-"}</td>
    <td>${d.fin||"-"}</td>
    <td>${d.diametro||"-"}</td>
    <td>${parseNumero(d.longitud).toFixed(0)}</td>
    <td>${d.estado||"-"}</td>
    <td>
      ${d.foto1?`<a href="${d.foto1}" target="_blank">I</a>`:""}
      ${d.foto2?`<a href="${d.foto2}" target="_blank">II</a>`:""}
      ${d.foto3?`<a href="${d.foto3}" target="_blank">BR</a>`:""}
    </td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("tablaDetalle").innerHTML=html;

  document.getElementById("paginado").innerHTML=`
  <button onclick="paginaActual--;calcular()" ${paginaActual===1?"disabled":""}>◀</button>
  Página ${paginaActual} de ${totalPag||1}
  <button onclick="paginaActual++;calcular()" ${paginaActual>=totalPag?"disabled":""}>▶</button>`;
}

// EVENTOS
document.addEventListener("input",()=>{paginaActual=1;calcular();});
document.addEventListener("change",()=>{paginaActual=1;calcular();});

// INIT
cargarDatos();

</script>

</body>
</html>

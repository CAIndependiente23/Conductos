<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Limpieza de Conductos</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin: 20px; }

button { margin:5px; padding:6px; cursor:pointer; }

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
  font-size: 13px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background:#eee; }

.faltante { background:#ffd6d6; }

#map { height: 400px; margin-top: 20px; }

#graficoWrap{
  width: 60%;
  margin: 20px auto;
}
</style>
</head>

<body>

<h2>Limpieza de Conductos</h2>

<div id="botones"></div>

<button onclick="setBuscador()">🔎 BUSCADOR GLOBAL</button>

<hr>

<div id="resumen"></div>

<div id="graficoWrap">
  <canvas id="grafico"></canvas>
</div>

<h3>Mapa</h3>
<div id="map"></div>

<h3>Detalle</h3>

<select id="zona">
  <option value="TODAS">Todas</option>
  <option>Zona 1</option>
  <option>Zona 2</option>
  <option>Zona 3</option>
  <option>Zona 4</option>
  <option>Zona 5</option>
</select>

<input id="texto" placeholder="Buscar calle">

<div id="detalle"></div>

<script>

// ================= STATE =================
let mode = "mes";
let mesActual = null;

// ================= DATA =================
let datos = [];
let chart;
let map;
let markers = [];

// ================= CONFIG =================
const URLS = {
 "Zona 1":"https://docs.google.com/spreadsheets/d/1HIJJCVYnwaDdAvgxfI4tBA-5wn_0B1Bog19cUgJYyuo/export?format=csv&gid=2037627206",
 "Zona 2":"https://docs.google.com/spreadsheets/d/1_uR77zitjM6EpbPlmhg92VaNteJuYb28hQkDKbWX2V4/export?format=csv&gid=1607259408",
 "Zona 3":"https://docs.google.com/spreadsheets/d/1Li4R4gjFHbFwryFgteY5KS3y43MGdiqL5zEu4NK_v6w/export?format=csv&gid=996112756",
 "Zona 4":"https://docs.google.com/spreadsheets/d/1AZAvTvfohVXr8qKlZuejzD1FXHO5T2itzG8rZpbkVUc/export?format=csv&gid=184101373",
 "Zona 5":"https://docs.google.com/spreadsheets/d/1gaPIk0bPccxj1Wi853iEzvPN3OhE92L1cHgMYJYgztI/export?format=csv&gid=1465503285"
};

const pliego = {
 "Zona 1":2590,
 "Zona 2":15246,
 "Zona 3":16238,
 "Zona 4":9980,
 "Zona 5":8309
};

// ================= UTILS =================
function clean(t){
 return (t||"").toString().toUpperCase()
 .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function get(r,n){
 let k=Object.keys(r).find(x=>clean(x)===clean(n));
 return k?r[k]:null;
}

function num(v){
 return parseFloat((v||"").toString().replace(".","").replace(",",".")||0);
}

// ================= MES =================
function parseMes(t){
 const m=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
 const c=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

 t=clean(t);
 let i=m.findIndex(x=>t.includes(x));
 let y=(t.match(/\d{4}/)||[])[0];
 if(i<0||!y)return null;

 let label=c[i]+"-"+y.slice(2);

 if(label==="JUL-25"||label==="AGO-25")return null;

 return {key:new Date(y,i,1).getTime(),label};
}

// ================= LOAD =================
async function load(){

 let prom=Object.entries(URLS).map(([z,url])=>new Promise(res=>{
  Papa.parse(url,{
   download:true,
   header:true,
   complete:r=>{
    res(r.data.map(d=>({
     Zona:z,
     mes:parseMes(get(d,"Certificado MES")),
     estado:get(d,"Aprobación"),
     long:num(get(d,"Longitud")),
     comuna:get(d,"Comuna"),
     calle:get(d,"Calle de traza"),
     ini:get(d,"Intersección Inicio"),
     fin:get(d,"Intersección Fin"),
     diam:get(d,"Diámetro"),
     f1:get(d,"Foto Bajada I (Inicio)"),
     f2:get(d,"Foto Bajada II (Fin)"),
     f3:get(d,"Foto BR")
    })));
   }
  });
 }));

 datos=(await Promise.all(prom)).flat().filter(d=>d.mes);

 init();
 buildButtons();
 render();
}

// ================= FILTER =================
function dataset(){

 if(mode==="buscador") return datos;

 return datos.filter(d=>d.mes.key===mesActual);
}

// ================= RENDER MAIN =================
function render(){
 let d=dataset();

 renderResumen(d);
 renderGrafico(d);
 renderDetalle(d);
}

// ================= RESUMEN =================
function renderResumen(d){

 let res={};
 Object.keys(pliego).forEach(z=>res[z]=0);

 d.forEach(x=>{
  if(x.estado?.includes("APROBADO")){
   res[x.Zona]+=x.long;
  }
 });

 let html="<table><tr><th>Zona</th><th>% Avance</th></tr>";

 Object.keys(res).forEach(z=>{
  let p=(res[z]/pliego[z]*100||0).toFixed(1);
  html+=`<tr><td>${z}</td><td>${p}%</td></tr>`;
 });

 html+="</table>";
 document.getElementById("resumen").innerHTML=html;
}

// ================= GRAFICO (FIX SIZE) =================
function renderGrafico(d){

 if(chart) chart.destroy();

 let zonas=Object.keys(pliego);

 let vals=zonas.map(z=>{
  let t=d.filter(x=>x.Zona===z && x.estado?.includes("APROBADO"))
  .reduce((a,b)=>a+b.long,0);

  return (t/pliego[z]*100)||0;
 });

 chart=new Chart(document.getElementById("grafico"),{
  type:"bar",
  data:{
   labels:zonas,
   datasets:[
    {
     data:vals,
     backgroundColor:["#FFD700","#007BFF","#FF69B4","#28A745","#FF8C00"]
    },
    {
     type:"line",
     data:zonas.map(()=>100),
     borderDash:[6,6],
     borderColor:"#999",
     pointRadius:0
    }
   ]
  },
  options:{
   responsive:true,
   maintainAspectRatio:false,
   plugins:{legend:{display:false}},
   indexAxis:"y",
   scales:{x:{max:120}}
  }
 });
}

// ================= DETALLE (FIX COMPLETO CAMPOS) =================
function renderDetalle(d){

 let z=document.getElementById("zona").value;
 let t=clean(document.getElementById("texto").value);

 let f=d.filter(x=>{
  let okZ=z==="TODAS"||x.Zona===z;
  let okT=!t||clean(x.calle).includes(t);
  return okZ&&okT;
 });

 let html=`<table><tr>
 <th>Zona</th>
 <th>Comuna</th>
 <th>Calle</th>
 <th>Inicio</th>
 <th>Fin</th>
 <th>Diámetro</th>
 <th>Longitud</th>
 <th>Fotos</th>
 <th>Aprobación</th>
 </tr>`;

 f.forEach(x=>{
  html+=`<tr>
  <td>${x.Zona}</td>
  <td>${x.comuna||""}</td>
  <td>${x.calle||""}</td>
  <td>${x.ini||""}</td>
  <td>${x.fin||""}</td>
  <td>${x.diam||""}</td>
  <td>${x.long}</td>
  <td>
   ${x.f1?`<a target="_blank" href="${x.f1}">I</a>`:""}
   ${x.f2?`<a target="_blank" href="${x.f2}">F</a>`:""}
   ${x.f3?`<a target="_blank" href="${x.f3}">BR</a>`:""}
  </td>
  <td>${x.estado||""}</td>
  </tr>`;
 });

 html+="</table>";
 document.getElementById("detalle").innerHTML=html;
}

// ================= BUTTONS =================
function buildButtons(){

 let meses=[...new Map(datos.map(d=>[d.mes.key,d.mes])).values()]
 .sort((a,b)=>a.key-b.key);

 let div=document.getElementById("botones");
 div.innerHTML="";

 meses.forEach(m=>{
  let b=document.createElement("button");
  b.innerText=m.label;

  b.onclick=()=>{
   mode="mes";
   mesActual=m.key;
   render();
  };

  div.appendChild(b);
 });
}

// ================= BUSCADOR =================
function setBuscador(){
 mode="buscador";
 render();
}

// ================= INIT =================
function init(){
 map=L.map("map").setView([-34.6,-58.38],11);
 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
}

load();

</script>

</body>
</html>

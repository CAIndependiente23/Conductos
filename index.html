<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Limpieza de Conductos</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin: 20px; }

.botones button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

.faltante { background-color: #ffcccc; }

#map {
  height: 400px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>Limpieza de Conductos</h2>

<div id="loading">Cargando datos...</div>

<div class="botones" id="botonesMes"></div>

<div id="tablaResumen"></div>

<div style="width: 80%; margin: 20px auto;">
  <canvas id="graficoZonas"></canvas>
</div>

<h3>Mapa de Conductos</h3>
<div id="map"></div>

<h3>Detalle de Registros</h3>

<div style="margin-bottom:10px;">
  <label>Zona:</label>
  <select id="filtroZona">
    <option value="TODAS">Todas</option>
    <option>Zona 1</option>
    <option>Zona 2</option>
    <option>Zona 3</option>
    <option>Zona 4</option>
    <option>Zona 5</option>
  </select>

  <label style="margin-left:20px;">Buscar calle:</label>
  <input type="text" id="buscadorCalle" placeholder="Ej: Corrientes">
</div>

<div id="tablaDetalle"></div>
<div id="paginado"></div>

<script>

// -------------------- DATA --------------------
const URLS_ZONAS = {
  "Zona 1": "https://docs.google.com/spreadsheets/d/1HIJJCVYnwaDdAvgxfI4tBA-5wn_0B1Bog19cUgJYyuo/export?format=csv&gid=2037627206",
  "Zona 2": "https://docs.google.com/spreadsheets/d/1_uR77zitjM6EpbPlmhg92VaNteJuYb28hQkDKbWX2V4/export?format=csv&gid=1607259408",
  "Zona 3": "https://docs.google.com/spreadsheets/d/1Li4R4gjFHbFwryFgteY5KS3y43MGdiqL5zEu4NK_v6w/export?format=csv&gid=996112756",
  "Zona 4": "https://docs.google.com/spreadsheets/d/1AZAvTvfohVXr8qKlZuejzD1FXHO5T2itzG8rZpbkVUc/export?format=csv&gid=184101373",
  "Zona 5": "https://docs.google.com/spreadsheets/d/1gaPIk0bPccxj1Wi853iEzvPN3OhE92L1cHgMYJYgztI/export?format=csv&gid=1465503285"
};

const URL_COORDS =
"https://docs.google.com/spreadsheets/d/1OsRXS125K9GfH24Qa6nriI4-MUeQB_OWWhJBdi1arw0/export?format=csv&gid=0";

const pliego = {
  "Zona 1": 2590,
  "Zona 2": 15246,
  "Zona 3": 16238,
  "Zona 4": 9980,
  "Zona 5": 8309
};

let datosGlobal = [];
let coordsMap = {};
let mesSeleccionado = null;
let modoBuscador = false;
let chart = null;
let map;
let markers = [];

// -------------------- INIT MAP --------------------
function initMap(){
  map = L.map('map').setView([-34.6, -58.38], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'OSM'
  }).addTo(map);
}

// -------------------- UTILS --------------------
function limpiarTexto(txt){
  return (txt||"").toString().trim().toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function getCol(row,name){
  let k=Object.keys(row).find(x=>limpiarTexto(x)===limpiarTexto(name));
  return k?row[k]:null;
}

function parseNum(v){
  return parseFloat((v||"").toString().replace(".","").replace(",",".")||0);
}

function parseMes(t){
  const m=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
  const c=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
  t=limpiarTexto(t);
  let i=m.findIndex(x=>t.includes(x));
  let y=(t.match(/\d{4}/)||[])[0];
  if(i<0||!y)return null;
  return {key:new Date(y,i,1).getTime(),label:c[i]+"-"+y.slice(2)};
}

// -------------------- LOAD COORDS --------------------
async function loadCoords(){
  return new Promise(res=>{
    Papa.parse(URL_COORDS,{
      download:true,
      header:true,
      complete:r=>{
        r.data.forEach(d=>{
          let id=getCol(d,"Marca temporal");
          let coord=getCol(d,"C1"); // "lat,lon"
          if(id && coord){
            let parts=coord.split(",");
            coordsMap[id.trim()] = {
              lat: parseFloat(parts[0]),
              lon: parseFloat(parts[1])
            };
          }
        });
        res();
      }
    });
  });
}

// -------------------- LOAD DATA --------------------
async function loadData(){

  let prom=Object.entries(URLS_ZONAS).map(([zona,url])=>new Promise(res=>{
    Papa.parse(url,{
      download:true,
      header:true,
      complete:r=>{
        res(r.data.map(d=>{
          let id=getCol(d,"Marca temporal");

          return {
            id,
            Zona:zona,
            mes:parseMes(getCol(d,"Certificado MES")),
            estado:getCol(d,"Aprobación"),
            long:parseNum(getCol(d,"Longitud")),
            calle:getCol(d,"Calle de traza"),
          };
        }));
      }
    });
  }));

  let all=(await Promise.all(prom)).flat();
  datosGlobal=all.filter(d=>d.mes);

  document.getElementById("loading").style.display="none";

  crearBotones();
  calcular();
}

// -------------------- BOTONES --------------------
function crearBotones(){
  let cont=document.getElementById("botonesMes");
  cont.innerHTML="";

  let meses=[...new Map(datosGlobal.map(d=>[d.mes.key,d.mes])).values()]
    .sort((a,b)=>a.key-b.key);

  meses.forEach(m=>{
    let b=document.createElement("button");
    b.innerText=m.label;
    b.onclick=()=>{mesSeleccionado=m.key;modoBuscador=false;calcular();};
    cont.appendChild(b);
  });
}

// -------------------- CALCULAR --------------------
function calcular(){

  let data=mesSeleccionado
    ? datosGlobal.filter(d=>d.mes.key===mesSeleccionado)
    : datosGlobal;

  renderMap(data);
}

// -------------------- MAP --------------------
function renderMap(data){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  data.forEach(d=>{
    let c=coordsMap[d.id];
    if(!c)return;

    let color=
      d.estado.includes("APROBADO")?"green":
      d.estado.includes("RECH")?"red":"orange";

    let marker=L.circleMarker([c.lat,c.lon],{
      radius:6,
      color
    }).addTo(map);

    marker.bindPopup(`
      <b>${d.Zona}</b><br>
      ${d.calle||""}<br>
      ${d.estado}
    `);

    markers.push(marker);
  });
}

// -------------------- START --------------------
async function start(){
  initMap();
  await loadCoords();
  await loadData();
}

start();

</script>

</body>
</html>

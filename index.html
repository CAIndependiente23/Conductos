<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Limpieza de Conductos</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin: 20px; }

.botones button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

.faltante { background-color: #ffcccc; }

#map { height: 420px; margin-top: 20px; }
</style>
</head>

<body>

<h2>Limpieza de Conductos</h2>

<div id="loading">Cargando datos...</div>

<div class="botones" id="botonesMes"></div>

<button onclick="activarBuscador()">🔎 BUSCADOR GLOBAL</button>

<div id="tablaResumen"></div>

<div style="width: 80%; margin: 20px auto;">
  <canvas id="graficoZonas"></canvas>
</div>

<h3>Mapa GIS</h3>
<div id="map"></div>

<h3>Detalle de Registros</h3>

<div style="margin-bottom:10px;">
  <label>Zona:</label>
  <select id="filtroZona">
    <option value="TODAS">Todas</option>
    <option>Zona 1</option>
    <option>Zona 2</option>
    <option>Zona 3</option>
    <option>Zona 4</option>
    <option>Zona 5</option>
  </select>

  <input id="buscadorCalle" placeholder="Buscar calle">
</div>

<div id="tablaDetalle"></div>
<div id="paginado"></div>

<script>

// ---------------- DATA ----------------
const URLS_ZONAS = {
  "Zona 1": "https://docs.google.com/spreadsheets/d/1HIJJCVYnwaDdAvgxfI4tBA-5wn_0B1Bog19cUgJYyuo/export?format=csv&gid=2037627206",
  "Zona 2": "https://docs.google.com/spreadsheets/d/1_uR77zitjM6EpbPlmhg92VaNteJuYb28hQkDKbWX2V4/export?format=csv&gid=1607259408",
  "Zona 3": "https://docs.google.com/spreadsheets/d/1Li4R4gjFHbFwryFgteY5KS3y43MGdiqL5zEu4NK_v6w/export?format=csv&gid=996112756",
  "Zona 4": "https://docs.google.com/spreadsheets/d/1AZAvTvfohVXr8qKlZuejzD1FXHO5T2itzG8rZpbkVUc/export?format=csv&gid=184101373",
  "Zona 5": "https://docs.google.com/spreadsheets/d/1gaPIk0bPccxj1Wi853iEzvPN3OhE92L1cHgMYJYgztI/export?format=csv&gid=1465503285"
};

const URL_COORDS =
"https://docs.google.com/spreadsheets/d/1OsRXS125K9GfH24Qa6nriI4-MUeQB_OWWhJBdi1arw0/export?format=csv&gid=0";

const pliego = {
  "Zona 1": 2590,
  "Zona 2": 15246,
  "Zona 3": 16238,
  "Zona 4": 9980,
  "Zona 5": 8309
};

let datosGlobal = [];
let coordsMap = {};
let mesSeleccionado = null;
let modoBuscador = false;

let chart = null;
let map;
let markers = [];
let pagina = 1;
const POR_PAGINA = 100;

// ---------------- MAP ----------------
function initMap(){
  map = L.map('map').setView([-34.6,-58.38], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'OSM'
  }).addTo(map);
}

// ---------------- UTILS ----------------
function limpiar(t){
  return (t||"").toString().trim().toUpperCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function get(r,n){
  let k=Object.keys(r).find(x=>limpiar(x)===limpiar(n));
  return k?r[k]:null;
}

function num(v){
  return parseFloat((v||"").toString().replace(".","").replace(",",".")||0);
}

// ---------------- MES ----------------
function parseMes(t){
  const m=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
  const c=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

  t=limpiar(t);
  let i=m.findIndex(x=>t.includes(x));
  let y=(t.match(/\d{4}/)||[])[0];
  if(i<0||!y)return null;

  let label=c[i]+"-"+y.slice(2);

  // ❌ eliminar meses de prueba
  if(label==="JUL-25" || label==="AGO-25") return null;

  return {key:new Date(y,i,1).getTime(),label};
}

// ---------------- LOAD COORDS ----------------
async function loadCoords(){
  return new Promise(res=>{
    Papa.parse(URL_COORDS,{
      download:true,
      header:true,
      complete:r=>{
        r.data.forEach(d=>{
          let id=get(d,"Marca temporal");
          let c=get(d,"C1");

          if(id && c){
            let [lat,lon]=c.split(",");
            coordsMap[id]={
              lat:parseFloat(lat),
              lon:parseFloat(lon)
            };
          }
        });
        res();
      }
    });
  });
}

// ---------------- LOAD DATA ----------------
async function loadData(){

  let prom=Object.entries(URLS_ZONAS).map(([z,url])=>new Promise(res=>{
    Papa.parse(url,{
      download:true,
      header:true,
      complete:r=>{
        res(r.data.map(d=>({
          id:get(d,"Marca temporal"),
          Zona:z,
          mes:parseMes(get(d,"Certificado MES")),
          estado:get(d,"Aprobación"),
          long:num(get(d,"Longitud")),
          calle:get(d,"Calle de traza")
        })));
      }
    });
  }));

  datosGlobal=(await Promise.all(prom)).flat().filter(d=>d.mes);

  document.getElementById("loading").style.display="none";

  crearBotones();
  calcular();
}

// ---------------- BOTONES ----------------
function crearBotones(){

  let cont=document.getElementById("botonesMes");
  cont.innerHTML="";

  let meses=[...new Map(datosGlobal.map(d=>[d.mes.key,d.mes])).values()]
  .sort((a,b)=>a.key-b.key);

  meses.forEach(m=>{
    let b=document.createElement("button");
    b.innerText=m.label;

    b.onclick=()=>{
      modoBuscador=false;
      mesSeleccionado=m.key;
      calcular();
    };

    cont.appendChild(b);
  });
}

// ---------------- BUSCADOR ----------------
function activarBuscador(){
  modoBuscador=true;
  mesSeleccionado=null;

  document.getElementById("tablaResumen").innerHTML="";
  if(chart) chart.destroy();

  renderDetalle(datosGlobal);
  renderMap(datosGlobal);
}

// ---------------- CALCULAR ----------------
function calcular(){

  let data = (modoBuscador || !mesSeleccionado)
    ? datosGlobal
    : datosGlobal.filter(d=>d.mes.key===mesSeleccionado);

  let res={};

  Object.keys(pliego).forEach(z=>{
    res[z]={longitud:0,rechazados:0,revision:0};
  });

  data.forEach(d=>{
    let e=limpiar(d.estado);
    if(!e) return;

    if(e==="APROBADO"||e.includes("50")){
      res[d.Zona].longitud+=d.long*(e.includes("50")?0.5:1);
    }
    if(e.includes("RECH")) res[d.Zona].rechazados+=d.long;
    if(e.includes("REV")) res[d.Zona].revision+=d.long;
  });

  renderTabla(res);
  renderGrafico(res);
  renderMap(data);
  renderDetalle(data);
}

// ---------------- TABLA ----------------
function renderTabla(data){

  let html=`<table><tr>
  <th>Zona</th><th>Aprobado</th><th>%</th><th>Faltantes</th>
  <th>Rech</th><th>Rev</th></tr>`;

  Object.keys(data).forEach(z=>{
    let d=data[z];
    let p=(d.longitud/pliego[z]*100||0).toFixed(1);
    let f=pliego[z]-d.longitud;

    html+=`<tr>
    <td>${z}</td>
    <td>${d.longitud.toFixed(0)}</td>
    <td>${p}%</td>
    <td class="${f>0?'faltante':''}">${f.toFixed(0)}</td>
    <td>${d.rechazados.toFixed(0)}</td>
    <td>${d.revision.toFixed(0)}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("tablaResumen").innerHTML=html;
}

// ---------------- GRAFICO LIMPIO ----------------
function renderGrafico(data){

  let ctx=document.getElementById("graficoZonas").getContext("2d");

  if(chart) chart.destroy();

  let zonas=Object.keys(data);
  let vals=zonas.map(z=>(data[z].longitud/pliego[z]*100||0));

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:zonas,
      datasets:[
        {
          data:vals,
          backgroundColor:['#FFD700','#007BFF','#FF69B4','#28A745','#FF8C00']
        },
        {
          type:'line',
          data:zonas.map(()=>100),
          borderDash:[5,5],
          borderColor:'#999',
          pointRadius:0
        }
      ]
    },
    options:{
      plugins:{legend:{display:false}},
      indexAxis:'y',
      scales:{x:{max:120}}
    }
  });
}

// ---------------- MAP ----------------
function renderMap(data){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  data.forEach(d=>{
    let c=coordsMap[d.id];
    if(!c) return;

    let color =
      d.estado.includes("APROBADO")?"green":
      d.estado.includes("RECH")?"red":"orange";

    let m=L.circleMarker([c.lat,c.lon],{
      radius:5,
      color
    }).addTo(map);

    m.bindPopup(`<b>${d.Zona}</b><br>${d.calle||""}<br>${d.estado}`);

    markers.push(m);
  });
}

// ---------------- DETALLE ----------------
function renderDetalle(data){

  let zona=document.getElementById("filtroZona")?.value || "TODAS";
  let txt=limpiar(document.getElementById("buscadorCalle")?.value || "");

  let filtrado=data.filter(d=>{
    return (zona==="TODAS"||d.Zona===zona) &&
           (!txt||limpiar(d.calle).includes(txt));
  });

  let inicio=(pagina-1)*POR_PAGINA;
  let page=filtrado.slice(inicio,inicio+POR_PAGINA);

  let html=`<table><tr>
  <th>Zona</th><th>Calle</th><th>Estado</th></tr>`;

  page.forEach(d=>{
    html+=`<tr>
    <td>${d.Zona}</td>
    <td>${d.calle||""}</td>
    <td>${d.estado||""}</td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("tablaDetalle").innerHTML=html;
}

// ---------------- START ----------------
async function start(){
  initMap();
  await loadCoords();
  await loadData();
}

start();

</script>

</body>
</html>

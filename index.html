<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard por Zona</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.botones button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #eee; }

.faltante {
  background-color: #ffcccc;
}
</style>
</head>

<body>

<h2>Dashboard por Zona</h2>

<div class="botones" id="botonesMes"></div>
<div id="tablaResumen"></div>

<script>

// 🔗 LINKS
const URLS_ZONAS = {
  "Zona 1": "https://docs.google.com/spreadsheets/d/1HIJJCVYnwaDdAvgxfI4tBA-5wn_0B1Bog19cUgJYyuo/export?format=csv&gid=2037627206",
  "Zona 2": "https://docs.google.com/spreadsheets/d/1_uR77zitjM6EpbPlmhg92VaNteJuYb28hQkDKbWX2V4/export?format=csv&gid=1607259408",
  "Zona 3": "https://docs.google.com/spreadsheets/d/1Li4R4gjFHbFwryFgteY5KS3y43MGdiqL5zEu4NK_v6w/export?format=csv&gid=996112756",
  "Zona 4": "https://docs.google.com/spreadsheets/d/1AZAvTvfohVXr8qKlZuejzD1FXHO5T2itzG8rZpbkVUc/export?format=csv&gid=184101373",
  "Zona 5": "https://docs.google.com/spreadsheets/d/1gaPIk0bPccxj1Wi853iEzvPN3OhE92L1cHgMYJYgztI/export?format=csv&gid=1465503285"
};

// 📊 PLIEGO
const pliego = {
  "Zona 1": 2590,
  "Zona 2": 15246,
  "Zona 3": 16238,
  "Zona 4": 9980,
  "Zona 5": 8309
};

let datosGlobal = [];
let mesSeleccionado = null;

// 🧠 meses
const meses = {
  "ENERO":0,"FEBRERO":1,"MARZO":2,"ABRIL":3,"MAYO":4,"JUNIO":5,
  "JULIO":6,"AGOSTO":7,"SEPTIEMBRE":8,"OCTUBRE":9,"NOVIEMBRE":10,"DICIEMBRE":11
};

const mesesCorto = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

// 🔧 utils
function limpiarTexto(txt) {
  if (!txt) return "";
  return txt.toString().trim().toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function getColumna(row, nombre) {
  let key = Object.keys(row).find(k => limpiarTexto(k) === limpiarTexto(nombre));
  return key ? row[key] : null;
}

function parseNumero(valor) {
  if (!valor) return 0;
  let limpio = valor.toString().replace(/\./g, "").replace(",", ".");
  return parseFloat(limpio) || 0;
}

function parseFecha(fechaStr) {
  if (!fechaStr) return null;
  let partes = fechaStr.split(" ")[0].split("/");
  if (partes.length !== 3) return null;
  return new Date(partes[2], partes[1]-1, partes[0]);
}

function parseMes(texto) {
  let t = limpiarTexto(texto);
  let mesNombre = Object.keys(meses).find(m => t.includes(m));
  let yearMatch = t.match(/\d{4}/);

  if (!mesNombre || !yearMatch) return null;

  let fecha = new Date(yearMatch[0], meses[mesNombre], 1);

  return {
    key: fecha.getTime(),
    label: mesesCorto[fecha.getMonth()] + "-" + fecha.getFullYear().toString().slice(-2)
  };
}

// 📥 cargar
async function cargarDatos() {

  let promesas = Object.entries(URLS_ZONAS).map(([zona, url]) => {
    return new Promise(resolve => {

      Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {

          let datos = results.data.map(d => {

            let mes = parseMes(getColumna(d, "Certificado MES"));

            return {
              Zona: zona,
              mesKey: mes?.key,
              mesLabel: mes?.label,
              estado: getColumna(d, "Aprobación"),
              longitud: getColumna(d, "Longitud"),
              fecha: getColumna(d, "Marca temporal")
            };

          });

          resolve(datos);
        }
      });

    });
  });

  let resultados = await Promise.all(promesas);
  datosGlobal = resultados.flat().filter(d => d.mesKey);

  crearBotones();
}

// 🔘 botones
function crearBotones() {

  const cont = document.getElementById("botonesMes");
  cont.innerHTML = "";

  let mesesUnicos = [...new Map(
    datosGlobal.map(d => [d.mesKey, d])
  ).values()]
  .sort((a,b) => a.mesKey - b.mesKey);

  mesesUnicos.forEach(m => {
    let btn = document.createElement("button");
    btn.innerText = m.mesLabel;

    btn.onclick = () => {
      mesSeleccionado = m.mesKey;
      calcular();
    };

    cont.appendChild(btn);
  });
}

// 🧠 calcular
function calcular() {

  let filtrados = datosGlobal.filter(d => d.mesKey === mesSeleccionado);

  let resultado = {};

  Object.keys(pliego).forEach(z => {
    resultado[z] = { longitud:0, rechazados:0, revision:0, ultimaFecha:null };
  });

  filtrados.forEach(d => {

    let zona = d.Zona;
    let estado = limpiarTexto(d.estado);
    let longitud = parseNumero(d.longitud);
    let fecha = parseFecha(d.fecha);

    if (!estado) return;

    if (estado === "APROBADO" || estado.includes("50")) {
      let factor = estado.includes("50") ? 0.5 : 1;
      resultado[zona].longitud += longitud * factor;

      if (fecha && (!resultado[zona].ultimaFecha || fecha > resultado[zona].ultimaFecha)) {
        resultado[zona].ultimaFecha = fecha;
      }
    }

    if (estado.includes("RECHAZ")) {
      resultado[zona].rechazados += longitud;
    }

    if (estado.includes("REVISION")) {
      resultado[zona].revision += longitud;
    }

  });

  renderTabla(resultado);
}

// 📊 tabla
function renderTabla(data) {

  let html = `<table>
    <tr>
      <th>Zona</th>
      <th>Longitud Aprobada</th>
      <th>% Pliego</th>
      <th>FALTANTES</th>
      <th>Última Aprobación</th>
      <th>Rechazado</th>
      <th>En Revisión</th>
    </tr>`;

  Object.keys(data).forEach(z => {
    let d = data[z];
    let porcentaje = ((d.longitud / pliego[z]) * 100 || 0).toFixed(1);
    let faltante = pliego[z] - d.longitud;

    html += `<tr>
      <td>${z}</td>
      <td>${d.longitud.toFixed(0)}</td>
      <td>${porcentaje}%</td>
      <td class="${faltante > 0 ? 'faltante' : ''}">${faltante.toFixed(0)}</td>
      <td>${d.ultimaFecha ? d.ultimaFecha.toLocaleDateString() : "-"}</td>
      <td>${d.rechazados.toFixed(0)}</td>
      <td>${d.revision.toFixed(0)}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById("tablaResumen").innerHTML = html;
}

// 🚀 iniciar
cargarDatos();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Limpieza de Conductos</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin: 20px; }

button { margin:5px; padding:6px; cursor:pointer; }

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background:#eee; }

.faltante { background:#ffd6d6; }

#map { height: 420px; margin-top: 20px; }
</style>
</head>

<body>

<h2>Limpieza de Conductos</h2>

<div id="botones"></div>

<button onclick="setBuscador()">🔎 BUSCADOR GLOBAL</button>

<hr>

<div id="resumen"></div>

<canvas id="grafico"></canvas>

<h3>Mapa</h3>
<div id="map"></div>

<h3>Detalle</h3>

<select id="zona">
  <option value="TODAS">Todas</option>
  <option>Zona 1</option>
  <option>Zona 2</option>
  <option>Zona 3</option>
  <option>Zona 4</option>
  <option>Zona 5</option>
</select>

<input id="texto" placeholder="Buscar calle">

<div id="detalle"></div>

<script>

// ================= STATE =================
const state = {
  mode: "mes",
  mes: null,
  zona: "TODAS",
  texto: ""
};

// ================= DATA =================
let datosGlobal = [];
let chart;
let map;
let markers = [];

// ================= CONFIG =================
const URLS = {
 "Zona 1":"https://docs.google.com/spreadsheets/d/1HIJJCVYnwaDdAvgxfI4tBA-5wn_0B1Bog19cUgJYyuo/export?format=csv&gid=2037627206",
 "Zona 2":"https://docs.google.com/spreadsheets/d/1_uR77zitjM6EpbPlmhg92VaNteJuYb28hQkDKbWX2V4/export?format=csv&gid=1607259408",
 "Zona 3":"https://docs.google.com/spreadsheets/d/1Li4R4gjFHbFwryFgteY5KS3y43MGdiqL5zEu4NK_v6w/export?format=csv&gid=996112756",
 "Zona 4":"https://docs.google.com/spreadsheets/d/1AZAvTvfohVXr8qKlZuejzD1FXHO5T2itzG8rZpbkVUc/export?format=csv&gid=184101373",
 "Zona 5":"https://docs.google.com/spreadsheets/d/1gaPIk0bPccxj1Wi853iEzvPN3OhE92L1cHgMYJYgztI/export?format=csv&gid=1465503285"
};

const pliego = {
 "Zona 1":2590,
 "Zona 2":15246,
 "Zona 3":16238,
 "Zona 4":9980,
 "Zona 5":8309
};

// ================= UTILS =================
function clean(t){
 return (t||"").toString().toUpperCase()
 .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function get(r,n){
 let k=Object.keys(r).find(x=>clean(x)===clean(n));
 return k?r[k]:null;
}

function num(v){
 return parseFloat((v||"").toString().replace(".","").replace(",",".")||0);
}

// ================= MES =================
function parseMes(t){
 const m=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
 const c=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];

 t=clean(t);
 let i=m.findIndex(x=>t.includes(x));
 let y=(t.match(/\d{4}/)||[])[0];
 if(i<0||!y)return null;

 let label=c[i]+"-"+y.slice(2);
 if(label==="JUL-25"||label==="AGO-25")return null;

 return {key:new Date(y,i,1).getTime(),label};
}

// ================= INIT =================
async function init(){

 map=L.map("map").setView([-34.6,-58.38],11);
 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

 await loadData();
}

// ================= LOAD =================
async function loadData(){

 let prom=Object.entries(URLS).map(([z,url])=>new Promise(res=>{
  Papa.parse(url,{
   download:true,
   header:true,
   complete:r=>{
    res(r.data.map(d=>({
      Zona:z,
      mes:parseMes(get(d,"Certificado MES")),
      estado:get(d,"Aprobación"),
      long:num(get(d,"Longitud")),
      calle:get(d,"Calle de traza"),
      ini:get(d,"Intersección Inicio"),
      fin:get(d,"Intersección Fin"),
      f1:get(d,"Foto Bajada I (Inicio)"),
      f2:get(d,"Foto Bajada II (Fin)"),
      f3:get(d,"Foto BR")
    })));
   }
  });
 }));

 datosGlobal=(await Promise.all(prom)).flat().filter(d=>d.mes);

 buildButtons();
 render();
}

// ================= STATE FILTER =================
function getData(){

 if(state.mode==="buscador") return datosGlobal;

 return datosGlobal.filter(d=>d.mes.key===state.mes);
}

// ================= RENDER =================
function render(){

 let data=getData();

 renderResumen(data);
 renderGrafico(data);
 renderDetalle(data);
 renderMapa(data);
}

// ================= RESUMEN =================
function renderResumen(data){

 let res={};
 Object.keys(pliego).forEach(z=>res[z]=0);

 data.forEach(d=>{
  if(d.estado?.includes("APROBADO")){
    res[d.Zona]+=d.long;
  }
 });

 let html="<table><tr><th>Zona</th><th>%</th></tr>";

 Object.keys(res).forEach(z=>{
  let p=(res[z]/pliego[z]*100||0).toFixed(1);
  html+=`<tr><td>${z}</td><td>${p}%</td></tr>`;
 });

 html+="</table>";

 document.getElementById("resumen").innerHTML=html;
}

// ================= GRAFICO =================
function renderGrafico(data){

 if(chart) chart.destroy();

 let zonas=Object.keys(pliego);

 let vals=zonas.map(z=>{
  let total=data.filter(d=>d.Zona===z && d.estado?.includes("APROBADO"))
  .reduce((a,b)=>a+b.long,0);

  return total/pliego[z]*100;
 });

 chart=new Chart(document.getElementById("grafico"),{
  type:"bar",
  data:{
   labels:zonas,
   datasets:[
    {data:vals,backgroundColor:["#FFD700","#007BFF","#FF69B4","#28A745","#FF8C00"]},
    {type:"line",data:zonas.map(()=>100),borderDash:[6,6],borderColor:"#999",pointRadius:0}
   ]
  },
  options:{
   plugins:{legend:{display:false}},
   indexAxis:"y",
   scales:{x:{max:120}}
  }
 });
}

// ================= DETALLE =================
function renderDetalle(data){

 let zona=document.getElementById("zona").value;
 let txt=clean(document.getElementById("texto").value);

 let f=data.filter(d=>{
  let okZ=zona==="TODAS"||d.Zona===zona;
  let okT=!txt||clean(d.calle).includes(txt);
  return okZ&&okT;
 });

 let html="<table><tr><th>Calle</th><th>Inicio</th><th>Fin</th><th>Long</th><th>Fotos</th></tr>";

 f.forEach(d=>{
  html+=`<tr>
  <td>${d.calle||""}</td>
  <td>${d.ini||""}</td>
  <td>${d.fin||""}</td>
  <td>${d.long}</td>
  <td>
   ${d.f1?`<a target="_blank" href="${d.f1}">I</a>`:""}
   ${d.f2?`<a target="_blank" href="${d.f2}">F</a>`:""}
   ${d.f3?`<a target="_blank" href="${d.f3}">BR</a>`:""}
  </td>
  </tr>`;
 });

 html+="</table>";
 document.getElementById("detalle").innerHTML=html;
}

// ================= MAP =================
function renderMapa(data){

 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 data.forEach(d=>{
  let lat=0,lon=0;
  if(!lat) return;

  let m=L.circleMarker([lat,lon]).addTo(map);
  markers.push(m);
 });
}

// ================= BUTTONS =================
function buildButtons(){

 let meses=[...new Map(datosGlobal.map(d=>[d.mes.key,d.mes])).values()]
 .sort((a,b)=>a.key-b.key);

 let div=document.getElementById("botones");
 div.innerHTML="";

 meses.forEach(m=>{
  let b=document.createElement("button");
  b.innerText=m.label;

  b.onclick=()=>{
   state.mode="mes";
   state.mes=m.key;
   render();
  };

  div.appendChild(b);
 });
}

// ================= BUSCADOR =================
function setBuscador(){
 state.mode="buscador";
 render();
}

// ================= EVENTS =================
document.getElementById("zona").addEventListener("change",render);
document.getElementById("texto").addEventListener("input",render);

// ================= START =================
init();

</script>

</body>
</html>
